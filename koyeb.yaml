name: pump-sniper-bot
regions:
  - nyc
services:
  - name: sniper-bot
    type: worker
    github:
      repository: your-username/your-repo
      branch: main
    build:
      builder: dockerfile
    run:
      command: python -u main.py
    ports:
      - port: 8000
        protocol: http
    env:
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: HELIUS_API_KEY
        value: ""   # Set via Koyeb dashboard secrets
      - name: TELEGRAM_BOT_TOKEN
        value: ""   # Set via Koyeb dashboard secrets
      - name: TELEGRAM_CHAT_ID
        value: ""   # Set via Koyeb dashboard secrets
      - name: WALLET_PRIVATE_KEY
        value: ""   # Set via Koyeb dashboard secrets
      - name: SIMULATION_MODE
        value: "false"
    instance_types:
      - type: free
